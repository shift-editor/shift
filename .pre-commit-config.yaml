repos:
  # Standard file hygiene
  # Generated files (bridge DTO typegen, NAPI .d.ts, parity fixtures) are excluded
  # because their format is owned by the generator. Re-formatting them here
  # creates churn with the hooks that regenerate them.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(packages/types/src/bridge/generated\.ts|packages/types/__fixtures__/|crates/shift-bridge/index\.(d\.ts|js))'
      - id: end-of-file-fixer
        exclude: '^(packages/types/src/bridge/generated\.ts|packages/types/__fixtures__/|crates/shift-bridge/index\.(d\.ts|js))'
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Slop detection
  - repo: local
    hooks:
      - id: no-empty-files
        name: no empty files
        entry: "bash -c 'for f in \"$@\"; do if [ -f \"$f\" ] && [ ! -s \"$f\" ]; then echo \"Empty file: $f\"; exit 1; fi; done'"
        language: system
        types_or: [javascript, jsx, ts, tsx, rust, css, json]

      - id: no-console-debug-output
        name: no console debug output in production code
        entry: "bash -c 'for f in \"$@\"; do case \"$f\" in *.test.*|*/testing/*|*/e2e/*|scripts/*|*/scripts/*) continue;; esac; if grep -En \"^[[:space:]]*console\\.(log|debug|table|group|groupCollapsed|groupEnd)\\b\" \"$f\" >/dev/null 2>&1; then echo \"$f has console debug output:\"; grep -En \"^[[:space:]]*console\\.(log|debug|table|group|groupCollapsed|groupEnd)\\b\" \"$f\"; exit 1; fi; done'"
        language: system
        types_or: [javascript, jsx, ts, tsx]

  # Rust hooks
  - repo: local
    hooks:
      - id: napi-dead-methods
        name: napi dead methods
        entry: ./scripts/check-napi-dead-methods.sh
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check-tests
        name: cargo check (including tests)
        entry: cargo check --workspace --tests --exclude shift-bridge
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --workspace --exclude shift-bridge
        language: system
        types: [rust]
        pass_filenames: false

  # TypeScript/JavaScript hooks
  - repo: local
    hooks:
      - id: oxfmt
        name: oxfmt
        entry: pnpm format
        language: system
        types_or: [javascript, jsx, ts, tsx, css, json, markdown]
        pass_filenames: false
        exclude: '^(packages/types/src/bridge/generated\.ts|packages/types/__fixtures__/|crates/shift-bridge/index\.(d\.ts|js))'

      - id: oxlint
        name: oxlint
        entry: pnpm lint:check
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: tsgo-typecheck
        name: tsgo typecheck
        entry: pnpm typecheck
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: deadcode
        name: deadcode (strict)
        entry: pnpm deadcode:strict
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: vitest
        name: vitest
        entry: pnpm test
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
