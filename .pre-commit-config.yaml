repos:
  # Standard file hygiene
  # Generated files (ts-rs output, NAPI .d.ts, parity fixtures) are excluded
  # because their format is owned by the generator. Re-formatting them here
  # creates a loop with the cargo-test hook that regenerates them.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(packages/types/src/generated/|packages/types/__fixtures__/|crates/shift-node/index\.(d\.ts|js))'
      - id: end-of-file-fixer
        exclude: '^(packages/types/src/generated/|packages/types/__fixtures__/|crates/shift-node/index\.(d\.ts|js))'
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  # Slop detection
  - repo: local
    hooks:
      - id: no-empty-files
        name: no empty files
        entry: "bash -c 'for f in \"$@\"; do if [ -f \"$f\" ] && [ ! -s \"$f\" ]; then echo \"Empty file: $f\"; exit 1; fi; done'"
        language: system
        types_or: [javascript, jsx, ts, tsx, rust, css, json]

      - id: no-console-log
        name: no console.log in production code
        entry: "bash -c 'for f in \"$@\"; do case \"$f\" in *.test.*|*/testing/*|*/e2e/*|scripts/*|*/scripts/*) continue;; esac; if grep -n \"^\\s*console\\.log\\b\" \"$f\" >/dev/null 2>&1; then echo \"$f has console.log:\"; grep -n \"^\\s*console\\.log\\b\" \"$f\"; exit 1; fi; done'"
        language: system
        types_or: [javascript, jsx, ts, tsx]

  # Rust hooks
  - repo: local
    hooks:
      - id: napi-dead-methods
        name: napi dead methods
        entry: ./scripts/check-napi-dead-methods.sh
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check-tests
        name: cargo check (including tests)
        entry: bash -c 'cargo check --package shift-node --tests'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: bash -c 'cargo test --workspace --exclude shift-node && npx tsx scripts/patch-generated-types.ts && git add packages/types/src/generated/*.ts'
        language: system
        types: [rust]
        pass_filenames: false

  # TypeScript/JavaScript hooks
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, css, json, markdown]

      - id: oxlint
        name: oxlint
        entry: pnpm lint:check
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: tsgo-typecheck
        name: tsgo typecheck
        entry: pnpm typecheck
        language: system
        types_or: [ts, tsx]
        pass_filenames: false

      - id: deadcode
        name: deadcode (strict)
        entry: pnpm deadcode:strict
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: vitest
        name: vitest
        entry: pnpm test
        language: system
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
